schema_version: "1.0"

overlay_id: "tom_ai_research_team"
overlay_name: "Tom AI Research Team benchmark overlay"
status: "draft"

repo:
  canonical_root:
    value: "/Users/stephenbeale/Projects/ToM_AI_Research_Team"
    status: "confirmed"
    notes: "Use this as the only benchmark repo root; the similarly named path with spaces is a non-canonical alias."

  benchmark_identity:
    name: "ToM_AI_Research_Team"
    status: "confirmed"
    notes: "Current working method is train.py-only local quality mode for frozen Variant 1 ambiguous bottleneck."

  source_of_truth_statement: >
    The benchmark repository is the source of truth for benchmark semantics,
    metric definitions, and scientific results. The orchestration repository
    must not silently redefine them.

zones:
  safe_editable:
    - path: "train.py"
      rationale: "Current working mode explicitly limits benchmark edits to train.py-only bounded hypothesis changes."
      status: "confirmed"

  sensitive_read_only:
    - path: "scripts/select_candidate.py"
      rationale: "Selection logic participates in scientific decision policy and comparability."
      status: "confirmed"
    - path: "logs/"
      rationale: "Local verification outputs are evidence-bearing artifacts and should not be treated as disposable."
      status: "confirmed"
    - path: "modal/"
      rationale: "Long-run outputs and incumbent archives are provenance-sensitive evidence stores."
      status: "confirmed"
    - path: "archive/"
      rationale: "Archive paths are documented as evidence-bearing and should not be casually rewritten."
      status: "assumed"

  prohibited_without_explicit_human_approval:
    - path: "env.py"
      rationale: "Frozen benchmark semantics unless an explicit benchmark revision is approved."
      status: "confirmed"
    - path: "eval.py"
      rationale: "Frozen evaluation semantics unless an explicit benchmark revision is approved."
      status: "confirmed"
    - path: "scripts/local_runner.py"
      rationale: "Current mode forbids runner edits so the benchmark harness and packaged artifact contract stay stable."
      status: "confirmed"

